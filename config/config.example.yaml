audio:
  sample_rate: 16000
  channels: 1
  dtype: int16
  block_ms: 20
  input_device: 1
  output_device: 4
  save_dir: runtime/recordings

segmenter:
  calibrate_seconds: 1.0
  threshold_ratio: 3.0
  min_threshold: 300
  start_voice_ms: 120
  end_silence_ms: 1000
  min_record_ms: 500
  max_record_seconds: 12
  pre_roll_ms: 300

asr:
  engine: dashscope_realtime_file
  whisper_model: medium
  language: zh
  http_url: ""
  http_api_key_env: ASR_API_KEY
  timeout_seconds: 60
  dummy_text: "机器人，收到请回答"
  min_confidence: 0.3
  dashscope_api_key: "YOUR_DASHSCOPE_API_KEY"
  dashscope_model: fun-asr-realtime
  dashscope_format: wav
  dashscope_sample_rate: 16000
  dashscope_base_http_api_url: "https://dashscope.aliyuncs.com/api/v1"
  dashscope_base_websocket_api_url: "wss://dashscope.aliyuncs.com/api-ws/v1/inference"
  dashscope_vocabulary_enabled: true
  dashscope_vocabulary_prefix: hamrobot
  dashscope_vocabulary_delete_after_call: true
  dashscope_vocabulary:
    - { text: "CQ", weight: 4 }
    - { text: "DE", weight: 4 }
    - { text: "QTH", weight: 4 }
    - { text: "QSL", weight: 4 }
    - { text: "QRZ", weight: 4 }
    - { text: "OVER", weight: 4 }
    - { text: "ROGER", weight: 4 }
    - { text: "73", weight: 3 }
    - { text: "昆山", weight: 3 }
    - { text: "周庄", weight: 3 }
    - { text: "泉盛", weight: 3 }

llm:
  provider: deepseek
  base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
  api_key_env: "" #your api key
  model: deepseek-v4-pro
  timeout_seconds: 60
  temperature: 0.3
  max_tokens: 120
  system_prompt: "你是一个HAM（业余无线电玩家）你的呼号是xxx，QTH在xxx。你需要守听线上的呼叫并做出回应。请根据以下规则生成应答文字：
1. 简短明了，每次应答不要超过30个中文字符。
2. 呼号规范：
   - 如果识别到对方呼号，开头或结尾必须报出对方呼号。
   - 你的呼号必须出现在结尾。
   - 使用“DE”分隔呼号，例如：BG7XXX DE TEST01。
3. 礼貌用语：可加入“你好”“收到”“OVER”等。
4. 使用简体中文。
5. 不泄露个人信息。
6. 场景理解：
   - “CQ CQ CQ” → 群呼，应答需包含你的呼号。
   - 明确呼叫你的呼号 → 针对呼叫者应答。
7. 示例：
   输入: “CQ CQ CQ BG7XXX”
   输出: “BG7XXX DE CQ CQ CQ，BG7XXX。OVER.”
   输入: “TEST01 DE BG7XXX”
   输出: “TEST01 DE BG7XXX，你好，BG7XXX。OVER.”

只输出应答文本。"
  dummy_reply: "收到，语音链路正常，over。"

tts:
  vox_prefix_ms: 500
  engine: edge #pyttsx3
  output_dir: runtime/tts
  rate: 150
  volume: 1.0
  edge_voice: zh-CN-XiaoxiaoNeural
  edge_rate: "-10%"
  edge_volume: "+0%"
  ffmpeg_path: ffmpeg
  http_url: ""
  http_api_key_env: TTS_API_KEY
  timeout_seconds: 60
  dummy_frequency_hz: 880
  dummy_seconds: 1.2

dialog:
  require_wake_word: true
  wake_words:
    - "机器人"
    - "是否有人"
    - "CQ"
  max_reply_chars: 80
  tx_cooldown_seconds: 3
  max_history_turns: 4

radio:
  mode: vox
  ptt_port: null
  ptt_baudrate: 9600
  ptt_line: rts
  ptt_active_high: true
  ptt_pre_delay_ms: 250
  ptt_post_delay_ms: 400
  vox_head_silence_ms: 900
  vox_tail_silence_ms: 300
  max_tx_seconds: 25

logging:
  level: INFO
  file: runtime/hamrobot.log
